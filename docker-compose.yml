services:
  db:
    image: postgres:18
    container_name: pioneer_db
    environment:
      POSTGRES_DB: pioneer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pioneer_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pioneer"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: pioneer_web
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pioneer_pgdata: